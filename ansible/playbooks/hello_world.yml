---
- name: Create the starter hello world file
  hosts: all
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Read the current system timezone
      ansible.builtin.command:
        cmd: timedatectl show --property=Timezone --value
      register: current_timezone
      changed_when: false

    - name: Set the system timezone to America/Sao_Paulo
      ansible.builtin.command:
        cmd: timedatectl set-timezone America/Sao_Paulo
      when: current_timezone.stdout | trim != 'America/Sao_Paulo'
      changed_when: true
      
    - name: Create hello world file on the VM
      ansible.builtin.copy:
        dest: "{{ hello_world_file_path }}"
        content: "{{ hello_world_message }}\n"
        owner: root
        group: root
        mode: "0644"
